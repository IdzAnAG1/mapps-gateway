name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/mapps-gateway

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ── 2. Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -v -race -count=1 ./...

  # ── 3. Build & Push image ─────────────────────────────────────────────────────
  docker:
    name: Build & Push image
    needs: [lint, test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-platform emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context:    .
          platforms:  linux/amd64,linux/arm64
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE_NAME }} with tags ${{ steps.meta.outputs.tags }}"

  # ── 4. Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to server
    needs: docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:        ${{ secrets.SSH_HOST }}
          port:        ${{ secrets.SSH_PORT }}
          username:    ${{ secrets.SSH_USER }}
          key:         ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            IMAGE="${{ env.IMAGE_NAME }}:latest"
            CONTAINER="mapps-gateway"
            CONF_DIR="/opt/mapps/gateway/configs"

            echo "Pulling $IMAGE ..."
            docker pull "$IMAGE"

            echo "Stopping old container (if running) ..."
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm   "$CONTAINER" 2>/dev/null || true

            echo "Starting new container ..."
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -v "$CONF_DIR":/data/conf \
              --network host \
              "$IMAGE"

            echo "Waiting for container to become healthy ..."
            for i in $(seq 1 15); do
              STATUS=$(docker inspect --format='{{.State.Status}}' "$CONTAINER" 2>/dev/null || echo "missing")
              if [ "$STATUS" = "running" ]; then
                echo "Container is running"
                break
              fi
              if [ "$i" = "15" ]; then
                echo "Container did not start in time"
                docker logs "$CONTAINER" --tail 50
                exit 1
              fi
              sleep 2
            done

            echo "Removing dangling images ..."
            docker image prune -f

            echo "Deploy complete. Container status:"
            docker ps --filter "name=$CONTAINER" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
