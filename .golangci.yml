version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - exhaustive
    - noctx
    - godot
    - gosec

linters-settings:
  gosec:
    excludes:
      - G115

  godot:
    scope: declarations
    capital: false

  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
        - gosec

    - path: "api/generated/"
      linters:
        - all

    - path: "api/viability/"
      linters:
        - all
